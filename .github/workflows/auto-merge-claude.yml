name: Auto-Merge Claude PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  auto-merge:
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Warte kurz auf CI-Checks
        run: sleep 10

      - name: Auto-Merge Claude PR
        run: |
          echo "Merge PR #${{ github.event.number }} von Branch ${{ github.head_ref }}"
          gh pr merge ${{ github.event.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
